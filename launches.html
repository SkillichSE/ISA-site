<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launches — ISA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css?v=3">
  <link rel="stylesheet" href="launches.css?v=2">
  <link rel="icon" type="image/png" href="ISSSSSSSAAAA.png">
</head>
<body>
  <nav id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">ISA</a>
      <div class="nav-links" id="nav-links">
        <a href="projects.html">Projects</a>
        <a href="launches.html">Launches</a>
        <a href="news.html">News</a>
        <a href="careers.html">Careers</a>
        <a href="https://discord.gg/CMDSKwTBnm" target="_blank">Discord</a>
        <a href="launchshare/index.html" class="nav-launch">Launchshare</a>
      </div>
      <button class="burger" id="burger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-hero">
    <div class="container">
      <p class="eyebrow">LAUNCH CALENDAR</p>
      <h1>Upcoming<br>Missions.</h1>
      <p>View all scheduled launches and deployment dates for ISA missions.</p>
    </div>
  </div>

  <section class="section-launches">
    <div class="container">
      <div class="launches-list" id="launches-list">
        <!-- rendered by JS -->
      </div>
      <div class="launches-empty" id="launches-empty" style="display:none">
        <p>No launches scheduled yet.</p>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left"><span class="footer-logo">ISA</span><span class="footer-copy">© 2026 International Space Association.</span></div>
      <div class="footer-links">
        <a href="projects.html">Projects</a>
        <a href="launches.html">Launches</a>
        <a href="news.html">News</a>
        <a href="careers.html">Careers</a>
        <a href="launchshare/index.html">Launchshare</a>
        <a href="https://discord.gg/CMDSKwTBnm" target="_blank">Discord</a>
      </div>
    </div>
  </footer>

  <script src="shared.js"></script>
  <script>
    const SB_URL = 'https://fqvghuvmgswegirgitom.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxdmdodXZtZ3N3ZWdpcmdpdG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTI4MTAsImV4cCI6MjA5NjY4ODgxMH0.7tKrak3ANnnhp4pISK2ythPdCt557vMACUhpQsqWn0s';

    fetch(`${SB_URL}/rest/v1/launches?order=launch_date`, {
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
    })
      .then(r => r.json())
      .then(launches => {
        const listEl = document.getElementById('launches-list');
        const emptyEl = document.getElementById('launches-empty');
        
        const published = launches.filter(l => l.published);
        
        if (published.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }

        listEl.innerHTML = published.map(l => {
          const date = l.date ? new Date(l.date) : null;
          const dateStr = date ? date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : 'TBD';
          
          return `
            <div class="launch-card reveal-target">
              <div class="launch-date">
                <div class="launch-date-day">${date ? date.getDate() : '—'}</div>
                <div class="launch-date-month">${date ? date.toLocaleDateString('en-US', { month: 'short' }) : '—'}</div>
              </div>
              <div class="launch-body">
                <div class="launch-meta">
                  ${l.mission_id ? `<span class="launch-mission" title="Mission">Mission ID: ${l.mission_id}</span>` : ''}
                  <span class="launch-status">${l.status || 'scheduled'}</span>
                </div>
                <h3 class="launch-title">${l.name || 'Unnamed Launch'}</h3>
                ${l.description ? `<p class="launch-desc">${l.description}</p>` : ''}
              </div>
              <div class="launch-date-full">${dateStr}</div>
            </div>`;
        }).join('');
      })
      .catch(err => {
        console.error('Error loading launches:', err);
        document.getElementById('launches-empty').style.display = 'block';
      });
  </script>
</body>
</html>
