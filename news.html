<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — ISA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css?v=5">
  <link rel="stylesheet" href="news.css">
  <link rel="icon" type="image/png" href="ISSSSSSSAAAA.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <script src="markdown.js"></script>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="page-hero">
    <div class="container">
      <p class="eyebrow">NEWS</p>
      <h1>Updates &<br>Announcements.</h1>
      <p>Mission updates, community announcements, and engineering dispatches from across ISA's programs.</p>
    </div>
  </div>

  <section class="section-news">
    <div class="container">
      <div id="news-featured-wrap"></div>
      <div class="news-masonry" id="news-grid"></div>
    </div>
  </section>

  <!-- Modal -->
  <div class="news-modal-backdrop" id="news-modal-backdrop">
    <div class="news-modal" id="news-modal">
      <button class="news-modal-close" id="news-modal-close" aria-label="Close">×</button>
      <div class="news-modal-img" id="news-modal-img"></div>
      <div class="news-modal-body">
        <div class="news-meta" id="news-modal-meta"></div>
        <h2 id="news-modal-title"></h2>
        <div class="news-body-text" id="news-modal-body"></div>

      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script>
    const SB_URL = 'https://fqvghuvmgswegirgitom.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxdmdodXZtZ3N3ZWdpcmdpdG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTI4MTAsImV4cCI6MjA5NjY4ODgxMH0.7tKrak3ANnnhp4pISK2ythPdCt557vMACUhpQsqWn0s';

    // image height alternation for masonry variety
    const IMG_SIZES = ['tall', 'short', 'tall', 'none', 'short', 'tall', 'none', 'short'];

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Dates in the DB can be typed inconsistently (ISO, "13 june 2026", "05/07/2026", "Jun 2, 2026"...).
    // parseFlexDate tries to make sense of whatever format was entered so posts can be sorted correctly.
    function parseFlexDate(str) {
      if (!str) return null;
      const s = String(str).trim();
      let m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/); // ISO: YYYY-MM-DD
      if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
      m = s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})$/); // DD/MM/YYYY or DD.MM.YYYY
      if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
      const d = new Date(s); // fallback: "13 June 2026", "Jun 2, 2026", etc.
      return isNaN(d.getTime()) ? null : d;
    }

    // Always display dates the same way, regardless of how they were originally typed.
    function formatNiceDate(str) {
      const d = parseFlexDate(str);
      if (!d) return escHtml(str);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    async function loadNews() {
      const featuredWrap = document.getElementById('news-featured-wrap');
      const grid = document.getElementById('news-grid');
      try {
        const r = await fetch(`${SB_URL}/rest/v1/news?order=id.desc`, {
          headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
        });
        const posts = await r.json();

        if (Array.isArray(posts)) {
          // Sort newest → oldest by the actual date, no matter what format it was typed in.
          posts.sort((a, b) => {
            const da = parseFlexDate(a.date);
            const db = parseFlexDate(b.date);
            const ta_ = da ? da.getTime() : -Infinity;
            const tb_ = db ? db.getTime() : -Infinity;
            return tb_ - ta_;
          });
        }

        if (!Array.isArray(posts) || !posts.length) {
          featuredWrap.innerHTML = '';
          grid.innerHTML = '<p style="color:var(--muted,#aaa);padding:40px 0">No news yet.</p>';
          return;
        }

        const [featured, ...rest] = posts;
        window._newsPosts = posts;

        // featured card
        featuredWrap.innerHTML = `
          <article class="news-featured reveal-target" data-post="0">
            <div class="news-featured-img" style="${featured.image ? `background-image:url('${escHtml(featured.image)}')` : ''}"></div>
            <div class="news-featured-body">
              <div class="news-meta">
                <span class="news-tag">${escHtml(featured.tag)}</span>
                <span class="news-date">${formatNiceDate(featured.date)}</span>
              </div>
              <h2>${escHtml(featured.title)}</h2>
              <p>${escHtml(mdToPlain(featured.body))}</p>
              <button class="news-read" data-post="0">Read full story →</button>
            </div>
          </article>`;

        // masonry cards
        grid.innerHTML = rest.map((n, i) => {
          const sizeClass = n.image ? (IMG_SIZES[i % IMG_SIZES.length] || 'short') : 'none';
          return `
          <article class="news-card reveal-target" data-post="${i + 1}">
            <div class="news-card-img ${sizeClass}" style="${n.image ? `background-image:url('${escHtml(n.image)}')` : ''}"></div>
            <div class="news-card-body">
              <div class="news-meta">
                <span class="news-tag">${escHtml(n.tag)}</span>
                <span class="news-date">${formatNiceDate(n.date)}</span>
              </div>
              <h3>${escHtml(n.title)}</h3>
              <p>${escHtml(mdToPlain(n.body))}</p>
              <button class="news-read" data-post="${i + 1}">Read more →</button>
            </div>
          </article>`;
        }).join('');

        // single delegated listener — find nearest [data-post] from click target
        ['news-featured-wrap', 'news-grid'].forEach(id => {
          document.getElementById(id).addEventListener('click', e => {
            // ignore clicks on the external modal link inside a card (shouldn't be any, but safety)
            if (e.target.tagName === 'A') return;
            const card = e.target.closest('[data-post]');
            if (!card) return;
            const post = window._newsPosts[+card.dataset.post];
            if (post) openNewsModal(post);
          });
        });

      } catch(e) {
        featuredWrap.innerHTML = '';
        grid.innerHTML = '<p style="color:#e05555;padding:40px 0">Failed to load news.</p>';
        console.error('loadNews error:', e);
      }
    }

    // --- Modal ---
    function openNewsModal(post) {
      const imgEl = document.getElementById('news-modal-img');
      if (post.image) {
        imgEl.style.backgroundImage = `url('${escHtml(post.image)}')`;
        imgEl.classList.remove('hidden');
      } else {
        imgEl.style.backgroundImage = '';
        imgEl.classList.add('hidden');
      }
      document.getElementById('news-modal-meta').innerHTML =
        `<span class="news-tag">${escHtml(post.tag)}</span><span class="news-date">${formatNiceDate(post.date)}</span>`;
      document.getElementById('news-modal-title').textContent = post.title || '';
      document.getElementById('news-modal-body').innerHTML = mdToHtml(post.body);

      document.getElementById('news-modal-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeNewsModal() {
      document.getElementById('news-modal-backdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('news-modal-backdrop').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeNewsModal();
    });

    document.getElementById('news-modal-close').addEventListener('click', closeNewsModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeNewsModal(); });

    loadNews();
  </script>
  <script src="shared.js?v=2"></script>
</body>
</html>
