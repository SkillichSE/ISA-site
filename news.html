<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — ISA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="news.css">
  <link rel="icon" type="image/png" href="ISSSSSSSAAAA.png">
</head>
<body>
  <nav id="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">ISA</a>
      <div class="nav-links" id="nav-links">
        <a href="projects.html">Projects</a>
        <a href="news.html">News</a>
        <a href="careers.html">Careers</a>
        <a href="services.html">Services</a>
        <a href="https://discord.gg/CMDSKwTBnm" target="_blank">Discord</a>
        <a href="launchshare/index.html" class="nav-launch">Launchshare ↗</a>
      </div>
      <button class="burger" id="burger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <div class="page-hero">
    <div class="container">
      <p class="eyebrow">NEWS</p>
      <h1>Updates &<br>Announcements.</h1>
      <p>Mission updates, community announcements, and engineering dispatches from across ISA's programs.</p>
    </div>
  </div>

  <section class="section-news">
    <div class="container">

      <div id="news-featured-wrap"></div>
      <div class="news-grid" data-stagger id="news-grid"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left"><span class="footer-logo">ISA</span><span class="footer-copy">© 2026 Italian Space Association.</span></div>
      <div class="footer-links">
        <a href="projects.html">Projects</a>
        <a href="news.html">News</a>
        <a href="careers.html">Careers</a>
        <a href="services.html">Services</a>
        <a href="launchshare/index.html">Launchshare</a>
        <a href="https://discord.gg/CMDSKwTBnm" target="_blank">Discord</a>
      </div>
    </div>
  </footer>
  <script>
    const DATA_URL = 'https://raw.githubusercontent.com/SkillichSE/ISA-site/main/data.json';

    async function loadNews() {
      const featuredWrap = document.getElementById('news-featured-wrap');
      const grid = document.getElementById('news-grid');
      try {
        const res = await fetch(DATA_URL);
        const data = await res.json();
        const posts = (data.news || []);
        if (!posts.length) {
          featuredWrap.innerHTML = '';
          grid.innerHTML = '<p style="color:var(--text-2,#aaa);padding:40px 0">No news yet.</p>';
          return;
        }
        const [featured, ...rest] = posts;
        featuredWrap.innerHTML = `
          <article class="news-featured reveal-target">
            <div class="news-featured-img" style="background-image:url('${featured.image||''}')"></div>
            <div class="news-featured-body">
              <div class="news-meta"><span class="news-tag">${featured.tag||''}</span><span class="news-date">${featured.date||''}</span></div>
              <h2>${featured.title||''}</h2>
              <p>${featured.body||''}</p>
              <a href="${featured.link||'#'}" class="news-read">Read more →</a>
            </div>
          </article>`;
        grid.innerHTML = rest.map(n => `
          <article class="news-card reveal-target">
            <div class="news-card-img" style="background-image:url('${n.image||''}')"></div>
            <div class="news-card-body">
              <div class="news-meta"><span class="news-tag">${n.tag||''}</span><span class="news-date">${n.date||''}</span></div>
              <h3>${n.title||''}</h3>
              <p>${n.body||''}</p>
              <a href="${n.link||'#'}" class="news-read">Read more →</a>
            </div>
          </article>`).join('');
      } catch(e) {
        featuredWrap.innerHTML = '';
        grid.innerHTML = '<p style="color:#e05555;padding:40px 0">Failed to load news.</p>';
      }
    }

    loadNews();
  </script>
  <script src="shared.js"></script>
</body>
</html>
