name: Update Discord stats

on:
  schedule:
    # Every 10 minutes (GitHub may delay scheduled runs by a few minutes)
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Discord stats
        run: node scripts/update-discord-stats.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add discord-stats.json
          if git diff --staged --quiet; then
            echo "No changes to discord-stats.json"
          else
            git commit -m "chore: update Discord stats"
            git push
          fi
